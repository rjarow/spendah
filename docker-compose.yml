services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/db.sqlite
      - AI_PROVIDER=${AI_PROVIDER:-openrouter}
      - AI_MODEL=${AI_MODEL:-anthropic/claude-3-haiku}
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        - VITE_API_PORT=${API_PORT:-8000}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_PORT=${API_PORT:-8000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  default:
    name: spendah-network

volumes:
  data:
